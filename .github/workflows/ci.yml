name: Full CI/CD to AWS ECR

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: mvn clean package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{secrets.AWS_REGION}}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{secrets.AWS_REGION}} \
          | docker login --username AWS --password-stdin \
          ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com

      - name: Build Docker image
        run: docker build -t arp-aws .

      - name: Tag Docker image
        run: |
          docker tag arp-aws:latest \
          ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/arp-aws:latest

      - name: Push Docker image to ECR
        run: |
          docker push ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/arp-aws:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
          --cluster ${{secrets.ECS_CLUSTER}} \
          --service ${{secrets.ECS_SERVICE}} \
          --force-new-deployment
